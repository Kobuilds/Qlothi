<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qlothi | Shop the Look</title>
    <link rel="stylesheet" href="results.css">
</head>
<body>
    <div class="glass-bg"></div>
    
    <header class="navbar">
        <div class="logo">Qlothi<span>.</span></div>
        <div class="search-info">
            <span id="searching-for">Searching for: </span>
            <strong id="item-query">...</strong>
        </div>
    </header>

    <main class="container">
        <aside class="sidebar">
            <div class="source-img-card glass">
                <h3>Your Inspiration</h3>
                <div class="img-frame">
                    <img id="source-image" src="" alt="Source outfit">
                </div>
            </div>
            
            <nav class="filters">
                <h3>Refine Search</h3>
                <button class="filter-btn active" data-filter="all">All Predictions</button>
                <button class="filter-btn" data-filter="budget">Budget Friendly</button>
                <button class="filter-btn" data-filter="style">Perfect Matches</button>
                <button class="filter-btn" data-filter="luxury">Premium Picks</button>
            </nav>

            <div class="external-searches glass">
                <h3>Global Search</h3>
                <div class="search-links">
                    <a id="google-link" href="#" target="_blank" class="search-btn google">
                        <span>🔍</span> Google Shopping
                    </a>
                    <a id="pinterest-link" href="#" target="_blank" class="search-btn pinterest">
                        <span>📌</span> Pinterest Lens
                    </a>
                </div>
            </div>
        </aside>

        <section class="results-grid" id="results-grid">
            <!-- Items injected by results.js -->
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Curating the best matches for you...</p>
            </div>
        </section>
    </main>

    <script src="results.js"></script>
</body>
</html>
